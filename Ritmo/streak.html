<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ritmo — My Streak</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:wght@400;500;600&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  color:#0d1b2a;
  background:#f0f7ff;
  background-image:
    radial-gradient(ellipse 65% 50% at 92% 8%, rgba(74,144,217,0.22) 0%,transparent 60%),
    radial-gradient(ellipse 50% 55% at 8% 92%, rgba(62,201,188,0.16) 0%,transparent 60%),
    linear-gradient(155deg,#f0f7ff 0%,#dbeeff 55%,#e8f5ff 100%);
  background-attachment:fixed;
  overflow-x:hidden;
}

/* ── Navbar ── */
.navbar{
  position:sticky;top:0;z-index:200;
  height:66px;display:flex;align-items:center;justify-content:space-between;
  padding:0 40px;
  background:rgba(255,255,255,0.82);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(168,212,245,0.4);
  box-shadow:0 1px 18px rgba(46,134,212,0.07);
}
.logo{
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.85rem;
  color:#2e86d4;text-decoration:none;display:flex;align-items:center;gap:6px;
}
.logo-dot{
  width:9px;height:9px;background:#3ec9bc;border-radius:50%;display:inline-block;
  animation:blink 2.2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}

.nav-links{display:flex;align-items:center;gap:6px;list-style:none}
.nav-links a{
  font-size:.85rem;font-weight:600;color:#5d7593;
  text-decoration:none;padding:7px 16px;border-radius:50px;transition:all .2s;
}
.nav-links a:hover{color:#2e86d4;background:#dbeeff}
.nav-links .nav-cta{
  background:#2e86d4;color:#fff!important;
  box-shadow:0 3px 14px rgba(46,134,212,.35);
}
.nav-links .nav-cta:hover{background:#1a5fa0;transform:translateY(-1px)}

/* ── Page wrapper ── */
.page{
  min-height:calc(100vh - 66px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:48px 20px 60px;
}

/* ── Card ── */
.card{
  background:rgba(255,255,255,0.9);
  border-radius:24px;
  border:1px solid rgba(255,255,255,0.8);
  box-shadow:0 6px 30px rgba(46,134,212,0.14);
  padding:40px 44px;
  width:100%;max-width:460px;
  backdrop-filter:blur(14px);
  animation:rise .5s cubic-bezier(.22,1,.36,1) both;
}
.card-md{max-width:580px}
.card-lg{max-width:820px}
@keyframes rise{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}

.card-icon{text-align:center;font-size:2.6rem;margin-bottom:8px}
.card-title{
  font-family:'Nunito',sans-serif;font-size:1.7rem;font-weight:900;
  color:#0d1b2a;text-align:center;margin-bottom:6px;
}
.card-sub{font-size:.875rem;color:#5d7593;text-align:center;line-height:1.6;margin-bottom:26px}

/* ── Buttons ── */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:13px 26px;border-radius:50px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;
  border:none;cursor:pointer;text-decoration:none;
  transition:all .22s cubic-bezier(.22,1,.36,1);
  margin-bottom:10px;
}
.btn:last-child{margin-bottom:0}
.btn-primary{
  background:linear-gradient(135deg,#5aaae7,#2e86d4);
  color:#fff;box-shadow:0 4px 18px rgba(46,134,212,.38);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(46,134,212,.46)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-ghost{background:#dbeeff;color:#1a5fa0}
.btn-ghost:hover{background:#c5e0f8;transform:translateY(-2px)}
.btn-teal{
  background:linear-gradient(135deg,#3ec9bc,#2daaa0);
  color:#fff;box-shadow:0 4px 18px rgba(62,201,188,.35);
}
.btn-teal:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(62,201,188,.45)}
.btn-outline{
  background:transparent;color:#2e86d4;
  border:2px solid #a8d4f5;
}
.btn-outline:hover{background:#dbeeff;border-color:#5aaae7}

/* ── Forms ── */
.form-group{margin-bottom:16px}
.form-group label{
  display:block;font-size:.78rem;font-weight:600;
  color:#5d7593;margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.04em;
}
.form-group input{
  width:100%;padding:13px 15px;
  border:1.5px solid rgba(168,212,245,.7);
  border-radius:10px;
  font-family:'DM Sans',sans-serif;font-size:.9rem;color:#0d1b2a;
  background:rgba(255,255,255,.8);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.form-group input:focus{
  border-color:#5aaae7;
  box-shadow:0 0 0 3px rgba(90,170,231,.18);
  background:#fff;
}
.form-group input::placeholder{color:#99afc4}

/* ── Divider ── */
.divider{
  display:flex;align-items:center;gap:10px;
  color:#99afc4;font-size:.75rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.06em;margin:20px 0;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(168,212,245,.5)}

/* ── Text utils ── */
.tc{text-align:center}
.small{font-size:.85rem;color:#5d7593}
.link{color:#2e86d4;font-weight:600;text-decoration:none}
.link:hover{color:#1a5fa0;text-decoration:underline}
.mt-8{margin-top:8px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}

/* ── Page header ── */
.page-header{text-align:center;margin-bottom:28px;animation:rise .4s ease both}
.page-header h2{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;color:#0d1b2a}
.page-header p{font-size:.875rem;color:#5d7593;margin-top:5px}

/* ── Hero ── */
.hero{text-align:center;max-width:540px;margin-bottom:32px;animation:rise .55s ease both}
.hero h1{
  font-family:'Nunito',sans-serif;font-size:3rem;font-weight:900;
  line-height:1.1;color:#0d1b2a;margin-bottom:14px;
}
.hero h1 em{font-style:normal;color:#2e86d4}
.hero p{font-size:1rem;color:#2c4057;line-height:1.7}
.streak-pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(46,134,212,.1);border:1.5px solid #a8d4f5;
  border-radius:50px;padding:7px 22px;margin:18px 0 26px;
  font-size:.88rem;font-weight:700;color:#1a5fa0;
}

/* ── Streak page ── */
.streak-big{text-align:center;padding:20px 0 16px}
.streak-big .s-emoji{font-size:2.8rem;display:block;margin-bottom:6px;animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.streak-big .s-num{
  font-family:'Nunito',sans-serif;font-size:5.5rem;font-weight:900;
  color:#2e86d4;line-height:1;
  animation:pop .55s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.streak-big .s-lbl{
  font-size:.8rem;font-weight:600;color:#99afc4;
  letter-spacing:.1em;text-transform:uppercase;margin-top:4px;
}
.prog-wrap{background:rgba(168,212,245,.3);border-radius:50px;height:9px;overflow:hidden;margin:6px 0 4px}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,#a8d4f5,#2e86d4);transition:width 1.2s cubic-bezier(.22,1,.36,1)}
.info-strip{
  display:flex;align-items:center;gap:10px;
  background:rgba(46,134,212,.07);border-radius:10px;
  padding:11px 16px;font-size:.83rem;color:#2c4057;
  font-weight:500;margin:14px 0 20px;
}

/* ── Achievements ── */
.stats-bar{
  display:flex;justify-content:space-around;align-items:center;
  padding:18px 28px;background:rgba(255,255,255,.9);
  border-radius:24px;border:1px solid rgba(255,255,255,.8);
  box-shadow:0 2px 12px rgba(46,134,212,.10);
  width:100%;max-width:460px;margin-bottom:20px;
  animation:rise .4s ease both;
}
.stat-item{text-align:center}
.stat-num{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900}
.stat-num.blue{color:#2e86d4}.stat-num.teal{color:#3ec9bc}.stat-num.amber{color:#f5a623}
.stat-lbl{font-size:.7rem;font-weight:600;color:#99afc4;text-transform:uppercase;letter-spacing:.05em}
.stat-sep{width:1px;height:36px;background:rgba(168,212,245,.4)}

.badges-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:16px;margin-top:4px}
.badge-card{
  border-radius:18px;border:2px solid rgba(168,212,245,.25);
  padding:26px 18px;text-align:center;
  background:rgba(255,255,255,.65);
  transition:all .25s ease;position:relative;overflow:hidden;
}
.badge-card.unlocked{
  border-color:rgba(90,170,231,.45);
  background:linear-gradient(145deg,rgba(208,235,255,.55),rgba(255,255,255,.93));
  box-shadow:0 4px 18px rgba(46,134,212,.13);
}
.badge-card.unlocked:hover{transform:translateY(-5px);box-shadow:0 10px 32px rgba(46,134,212,.2)}
.badge-card.locked{opacity:.62;filter:grayscale(.5)}
.badge-icon-lg{font-size:2.8rem;display:block;margin-bottom:10px}
.badge-name{font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;color:#0d1b2a;margin-bottom:4px}
.badge-desc{font-size:.76rem;color:#5d7593;line-height:1.45}
.badge-req{font-size:.72rem;color:#99afc4;margin-top:6px}
.badge-tag{
  display:inline-block;margin-top:12px;padding:4px 14px;
  border-radius:50px;font-size:.7rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.06em;
}
.badge-card.unlocked .badge-tag{background:rgba(62,201,188,.15);color:#1d8a82}
.badge-card.locked   .badge-tag{background:rgba(153,175,196,.15);color:#99afc4}
.badge-card.unlocked::after{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);
  transform:skewX(-18deg);animation:shine 3.5s ease-in-out infinite;
}
@keyframes shine{0%{left:-60%}60%,100%{left:130%}}

/* ── Reminders ── */
.reminder-item{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:rgba(240,247,255,.85);border-left:3px solid #5aaae7;
  border-radius:10px;padding:13px 15px;margin-bottom:10px;
  animation:rise .3s ease both;
}
.r-name{font-weight:700;font-size:.88rem;color:#0d1b2a}
.r-time{font-size:.76rem;color:#99afc4;margin-top:2px}
.r-msg{font-size:.78rem;color:#2e86d4;font-style:italic;max-width:150px;text-align:right}
.r-del{
  background:none;border:none;cursor:pointer;color:#e85555;
  font-size:1rem;padding:4px 6px;border-radius:6px;flex-shrink:0;transition:background .18s;
}
.r-del:hover{background:rgba(232,85,85,.1)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  padding:12px 26px;border-radius:50px;
  font-size:.85rem;font-weight:600;color:#fff;
  box-shadow:0 8px 28px rgba(0,0,0,.18);z-index:999;
  transition:transform .38s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;background:#0d1b2a;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok {background:linear-gradient(135deg,#3ec9bc,#2daaa0)}
.toast.err{background:linear-gradient(135deg,#f47676,#e85555)}
.toast.inf{background:linear-gradient(135deg,#5aaae7,#2e86d4)}

/* ── Footer nav ── */
.foot-nav{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:28px;animation:rise .7s ease both}
.foot-nav a{
  font-size:.8rem;font-weight:600;color:#5d7593;text-decoration:none;
  padding:7px 16px;border-radius:50px;
  background:rgba(255,255,255,.65);border:1px solid rgba(168,212,245,.4);
  transition:all .2s;
}
.foot-nav a:hover{background:#fff;color:#2e86d4;box-shadow:0 2px 12px rgba(46,134,212,.12)}

@media(max-width:600px){
  .navbar{padding:0 16px}
  .card{padding:26px 20px}
  .hero h1{font-size:2.1rem}
  .streak-big .s-num{font-size:4rem}
  .badges-grid{grid-template-columns:1fr 1fr}
  .stats-bar{padding:14px 16px}
}
</style>

</head>
<body>

<nav class="navbar">
  <a href="main.html" class="logo">Ritmo<span class="logo-dot"></span></a>
  <ul class="nav-links">
    <li><a href="main.html">Home</a></li>
    <li><a href="achievements.html">Badges</a></li>
    <li><a href="reminder.html" class="nav-cta">Reminders</a></li>
  </ul>
</nav>

<main class="page">

  <div class="page-header">
    <h2>My Habit Streak</h2>
    <p>Mark your habit done every day to keep the flame alive!</p>
  </div>

  <div class="card">
    <div class="streak-big">
      <span class="s-emoji" id="s-emoji">Your Streak</span>
      <div class="s-num" id="s-num">0</div>
      <div class="s-lbl">Day Streak</div>
    </div>

    <div style="display:flex;justify-content:space-between;font-size:.76rem;color:#99afc4;font-weight:600;margin-top:10px;">
      <span>Progress to 30 days</span>
      <span id="prog-txt">0 / 30</span>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

    <div class="info-strip">
      <span>&#12819;</span>
      <span id="status-msg">Loading...</span>
    </div>

    <button class="btn btn-primary" id="mark-btn" onclick="markDone()">&#9989; Mark Habit as Done Today</button>
    <button class="btn btn-outline" onclick="resetStreak()">&#128260; Reset Streak</button>

    <p class="tc mt-16" style="font-size:.78rem;color:#99afc4;">
      Last completed: <strong id="last-date">Never</strong>
    </p>
  </div>

  <div class="foot-nav">
    <a href="main.html">&#127968; Home</a>
    <a href="achievements.html">&#127942; Achievements</a>
    <a href="reminder.html">&#9200; Reminders</a>
  </div>

</main>
<div class="toast" id="toast"></div>

<script>
  function today()     { return new Date().toISOString().split('T')[0]; }
  function yesterday() { var d=new Date(); d.setDate(d.getDate()-1); return d.toISOString().split('T')[0]; }
  function fmtDate(s)  {
    if (!s || s==='Never') return 'Never';
    return new Date(s+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  }
  function render() {
    var streak=parseInt(localStorage.getItem('streak')||'0');
    var last=localStorage.getItem('lastCompletedDate')||'Never';
    document.getElementById('s-num').textContent=streak;
    document.getElementById('last-date').textContent=fmtDate(last);
    var pct=Math.min((streak/30)*100,100);
    document.getElementById('prog-fill').style.width=pct+'%';
    document.getElementById('prog-txt').textContent=streak+' / 30';
    document.getElementById('s-emoji').textContent=streak===0?'&#128164;':streak<7?'Your Streak':streak<30?'&#9889;':'&#127775;';
    var btn=document.getElementById('mark-btn');
    var msg=document.getElementById('status-msg');
    if (last===today()) {
      msg.textContent="Great job! You've already completed today's habit!";
      btn.textContent='Already Done Today!';
      btn.disabled=true; btn.style.opacity='.6'; btn.style.cursor='not-allowed';
    } else if (last!=='Never' && last!==yesterday()) {
      msg.textContent='You missed a day. Your streak will restart from today.';
      btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer';
    } else {
      msg.textContent="Mark today's habit done to keep your streak going!";
      btn.disabled=false; btn.style.opacity='1'; btn.style.cursor='pointer';
    }
  }
  function markDone() {
    var t=today(), y=yesterday();
    var streak=parseInt(localStorage.getItem('streak')||'0');
    var last=localStorage.getItem('lastCompletedDate')||'Never';
    if (last===t) { toast('Already done today! Come back tomorrow.','inf'); return; }
    if      (last===y)       { streak+=1; }
    else if (last==='Never') { streak=1; }
    else                     { streak=1; toast('Streak reset! Starting fresh.','err'); }
    localStorage.setItem('streak',streak);
    localStorage.setItem('lastCompletedDate',t);
    unlockBadges(streak);
    if (streak>1) toast('Day '+streak+' complete!','ok');
    else toast('Day 1 — great start!','ok');
    render();
  }
  function resetStreak() {
    if (!confirm('Reset your streak? This cannot be undone!')) return;
    localStorage.setItem('streak','0');
    localStorage.removeItem('lastCompletedDate');
    toast('Streak reset to 0.','inf'); render();
  }
  function unlockBadges(streak) {
    var a=JSON.parse(localStorage.getItem('achievements')||'{}');
    if(streak>=1)  a.day1=true;
    if(streak>=7)  a.day7=true;
    if(streak>=30) a.day30=true;
    if(streak>=50) a.day50=true;
    localStorage.setItem('achievements',JSON.stringify(a));
  }
  function toast(msg,type) {
    var t=document.getElementById('toast');
    t.textContent=msg; t.className='toast '+type;
    requestAnimationFrame(function(){ t.classList.add('show'); });
    setTimeout(function(){ t.classList.remove('show'); },2800);
  }
  render();
</script>
</body>
</html>
