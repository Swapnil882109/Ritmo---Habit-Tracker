<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ritmo – Achievements</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Inter:wght@400;500;600;700&display=swap');
    :root{--b3:#4a90d9;--b4:#2563b0;--tl:#38b2ac;--rd:#e05252;--card:rgba(255,255,255,0.88);--t1:#1a2535;--t2:#4a5a72;--t3:#9aaabb;--r:20px;--sh:0 8px 32px rgba(37,99,176,0.13);}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:linear-gradient(135deg,#e8f4fd 0%,#d0e9fa 40%,#b8d9f5 100%);color:var(--t1);overflow-x:hidden;}
    body::before{content:'';position:fixed;top:-140px;right:-140px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(74,144,217,.22),transparent 70%);pointer-events:none;z-index:0;}
    body::after{content:'';position:fixed;bottom:-100px;left:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(56,178,172,.18),transparent 70%);pointer-events:none;z-index:0;}
    nav{position:sticky;top:0;z-index:200;height:66px;background:rgba(255,255,255,.75);backdrop-filter:blur(18px);border-bottom:1px solid rgba(74,144,217,.14);display:flex;align-items:center;justify-content:space-between;padding:0 40px;box-shadow:0 2px 18px rgba(74,144,217,.08);}
    .logo{font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:900;color:var(--b4);text-decoration:none;display:flex;align-items:center;gap:6px;}
    .ld{display:inline-block;width:9px;height:9px;background:var(--tl);border-radius:50%;animation:pd 2s ease-in-out infinite;}
    @keyframes pd{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.6}}
    .nl{display:flex;align-items:center;gap:6px;list-style:none;}
    .nl a{font-size:.85rem;font-weight:600;color:var(--t2);text-decoration:none;padding:8px 16px;border-radius:50px;transition:all .2s;}
    .nl a:hover{color:var(--b3);background:rgba(74,144,217,.1);}
    .nl a.act{background:var(--b3);color:#fff;box-shadow:0 4px 14px rgba(74,144,217,.35);}
    .page{position:relative;z-index:1;min-height:calc(100vh - 66px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;}
    @keyframes fu{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
    .ph{text-align:center;margin-bottom:28px;animation:fu .4s ease both;}
    .ph h2{font-family:'Nunito',sans-serif;font-size:2rem;font-weight:900;color:var(--t1);}
    .ph p{font-size:.87rem;color:var(--t3);margin-top:4px;}
    /* Stats bar */
    .stats-card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:22px 36px;width:100%;max-width:560px;border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(10px);margin-bottom:20px;animation:fu .45s ease both;}
    .sr{display:flex;align-items:center;justify-content:space-around;}
    .sv{font-family:'Nunito',sans-serif;font-size:2.2rem;font-weight:900;}
    .sl{font-size:.72rem;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
    .vl{width:1px;height:44px;background:rgba(74,144,217,.15);}
    /* Badges card */
    .card{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);padding:32px 36px;width:100%;max-width:720px;border:1px solid rgba(255,255,255,.7);backdrop-filter:blur(10px);animation:fu .5s cubic-bezier(.22,1,.36,1) both;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:18px;}
    .bc{border-radius:var(--r);border:2px solid rgba(74,144,217,.12);padding:26px 16px;text-align:center;position:relative;overflow:hidden;background:rgba(255,255,255,.65);transition:all .25s;}
    .bc.on{border-color:rgba(74,144,217,.35);background:linear-gradient(135deg,rgba(200,230,255,.35),rgba(255,255,255,.9));box-shadow:0 6px 24px rgba(74,144,217,.18);}
    .bc.on:hover{transform:translateY(-5px);box-shadow:0 14px 36px rgba(74,144,217,.28);}
    .bc.off{filter:grayscale(.65);opacity:.65;}
    .bi{font-size:2.8rem;display:block;margin-bottom:10px;}
    .bn{font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;color:var(--t1);margin-bottom:4px;}
    .bd{font-size:.78rem;color:var(--t3);line-height:1.45;}
    .bh{font-size:.72rem;color:var(--t3);margin-top:6px;}
    .btag{display:inline-block;margin-top:12px;font-size:.7rem;font-weight:700;padding:4px 14px;border-radius:50px;text-transform:uppercase;letter-spacing:.06em;}
    .bc.on .btag{background:rgba(56,178,172,.15);color:#1d7a76;}
    .bc.off .btag{background:rgba(154,170,187,.15);color:var(--t3);}
    .bc.on::before{content:'';position:absolute;top:-50%;left:-60%;width:45%;height:200%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.45),transparent);transform:skewX(-20deg);animation:sh 3.5s infinite;}
    @keyframes sh{0%{left:-60%}60%,100%{left:130%}}
    /* Tip card */
    .tip{background:rgba(74,144,217,.07);border-radius:var(--r);padding:18px 26px;max-width:560px;width:100%;margin-top:16px;text-align:center;animation:fu .65s ease both;}
    .tip p{font-size:.87rem;color:var(--t2);line-height:1.6;}
    .tip a{color:var(--b3);font-weight:700;text-decoration:none;}
    .fn{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-top:28px;position:relative;z-index:1;}
    .fn a{font-size:.8rem;font-weight:600;color:var(--t2);text-decoration:none;padding:8px 18px;border-radius:50px;background:rgba(255,255,255,.6);border:1px solid rgba(74,144,217,.15);transition:all .2s;}
    .fn a:hover{background:#fff;color:var(--b3);box-shadow:0 4px 14px rgba(74,144,217,.15);}
    @media(max-width:600px){nav{padding:0 18px;}.card,.stats-card{padding:24px 18px;}.grid{grid-template-columns:1fr 1fr;}}
  </style>
</head>
<body>
  <nav>
    <a href="main.html" class="logo">Ritmo<span class="ld"></span></a>
    <ul class="nl">
      <li><a href="main.html">Home</a></li>
      <li><a href="streak.html">🔥 Streak</a></li>
      <li><a href="reminder.html" class="act">⏰ Reminders</a></li>
    </ul>
  </nav>

  <div class="page">
    <div class="ph"><h2>🏆 Achievements</h2><p>Unlock badges by building your daily habit streak!</p></div>

    <!-- Stats bar -->
    <div class="stats-card">
      <div class="sr">
        <div style="text-align:center"><div class="sv" id="st-streak" style="color:var(--b3)">0</div><div class="sl">Current Streak</div></div>
        <div class="vl"></div>
        <div style="text-align:center"><div class="sv" id="st-unlocked" style="color:var(--tl)">0</div><div class="sl">Unlocked</div></div>
        <div class="vl"></div>
        <div style="text-align:center"><div class="sv" style="color:#f6a45e">4</div><div class="sl">Total Badges</div></div>
      </div>
    </div>

    <!-- Badges -->
    <div class="card">
      <div class="grid" id="grid"></div>
    </div>

    <!-- Tip -->
    <div class="tip">
      <p>💡 <strong>Tip:</strong> Head to the <a href="streak.html">Streak page</a> and mark your habit done every day to unlock all badges!</p>
    </div>

    <div class="fn">
      <a href="main.html">🏠 Home</a>
      <a href="streak.html">🔥 Streak</a>
      <a href="reminder.html">⏰ Reminders</a>
    </div>
  </div>

  <script>
    // Badge definitions
    const BADGES = [
      {id:'day1', icon:'🌱', name:'First Step',       desc:'Completed your very first habit!',          req:1,  color:'#38b2ac'},
      {id:'day7', icon:'🔥', name:'7-Day Warrior',    desc:'Maintained a 7-day streak. Impressive!',    req:7,  color:'#f6a45e'},
      {id:'day30',icon:'⭐', name:'30-Day Champion',  desc:'A full month of consistent habits!',         req:30, color:'#4a90d9'},
      {id:'day50',icon:'🏆', name:'50-Day Legend',    desc:'50 days straight — you are unstoppable!',   req:50, color:'#a78bfa'},
    ];

    function render(){
      const streak = parseInt(localStorage.getItem('streak')||'0');
      const ach    = JSON.parse(localStorage.getItem('achievements')||'{}');

      // Auto-unlock based on streak
      if(streak>=1)  ach.day1 =true;
      if(streak>=7)  ach.day7 =true;
      if(streak>=30) ach.day30=true;
      if(streak>=50) ach.day50=true;
      localStorage.setItem('achievements',JSON.stringify(ach));

      // Stats
      document.getElementById('st-streak').textContent   = streak;
      document.getElementById('st-unlocked').textContent = Object.values(ach).filter(Boolean).length;

      // Badges
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      BADGES.forEach(b=>{
        const on = ach[b.id]===true;
        const el = document.createElement('div');
        el.className = 'bc '+(on?'on':'off');
        if(on) el.style.borderColor = b.color+'55';
        el.innerHTML =
          '<span class="bi">'+b.icon+'</span>'+
          '<div class="bn">'+b.name+'</div>'+
          '<div class="bd">'+b.desc+'</div>'+
          (!on?'<div class="bh">Reach '+b.req+'-day streak</div>':'')+
          '<span class="btag">'+(on?'✅ Unlocked':'🔒 Locked')+'</span>';
        grid.appendChild(el);
      });
    }
    render();
  </script>
</body>
</html>
